name: YouTube Digest

on:
  schedule:
    - cron: '13 */2 * * *'   # every 2h at :13 — reliable cadence (GitHub throttles high-frequency crons). The residential proxy handles the bot-check, so big batches are safe.
  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed mode: mark current feed items as seen without summarizing'
        type: boolean
        default: false

permissions:
  contents: write        # commit state + summaries back to the repo
  pages: write           # deploy to GitHub Pages
  id-token: write        # required by deploy-pages

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # hard backstop — never let a hung fetch run for hours
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (manages the Python env on demand)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install site dependencies
        run: npm ci

      # Optional: authenticate yt-dlp so YouTube's "confirm you're not a bot"
      # block on cloud IPs is bypassed. Add a repo secret YTDLP_COOKIES containing
      # a Netscape-format cookies.txt exported from a logged-in browser.
      - name: Write YouTube cookies (if provided)
        env:
          YTDLP_COOKIES_CONTENT: ${{ secrets.YTDLP_COOKIES }}
        run: |
          if [ -n "$YTDLP_COOKIES_CONTENT" ]; then
            printf '%s' "$YTDLP_COOKIES_CONTENT" > "$RUNNER_TEMP/cookies.txt"
            echo "YTDLP_COOKIES=$RUNNER_TEMP/cookies.txt" >> "$GITHUB_ENV"
            echo "cookies configured"
          else
            echo "no cookies secret set — proceeding without (bot-check may block some videos)"
          fi

      - name: Run digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN }}
          # Residential proxy for YouTube only (bypasses the bot-check); LLM stays direct.
          # Either a full YT_PROXY URL, or Decodo username/password (rotates sticky ports).
          YT_PROXY: ${{ secrets.YT_PROXY }}
          DECODO_USERNAME: ${{ secrets.DECODO_USERNAME }}
          DECODO_PASSWORD: ${{ secrets.DECODO_PASSWORD }}
          DECODO_HOST: ${{ vars.DECODO_HOST }}
          DECODO_PORT: ${{ vars.DECODO_PORT }}
        run: |
          if [ "${{ inputs.seed }}" = "true" ]; then
            uv run scripts/digest.py --seed
          else
            uv run scripts/digest.py
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/summaries/ docs/index.md
          # Keep a heartbeat so the schedule isn't auto-disabled after 60 idle days.
          date -u +%FT%TZ > data/last-run
          git add data/last-run
          git diff --cached --quiet || git commit -m "chore: digest $(date -u +%F)"
          # main can advance while the digest is running (a push from a laptop,
          # say), which rejects our push. Rebase onto it and retry rather than
          # failing the run — the commit here only adds generated files.
          for attempt in 1 2 3; do
            git push && break
            if [ "$attempt" -eq 3 ]; then
              echo "::error::push still rejected after $attempt rebase attempts"
              exit 1
            fi
            git pull --rebase origin "$GITHUB_REF_NAME" || {
              git rebase --abort || true
              echo "::error::rebase onto $GITHUB_REF_NAME hit a conflict; resolve it locally"
              exit 1
            }
          done

      # ---- searchable transcript corpus -------------------------------------
      # data/corpus.db is derived data and stays out of git (SQLite rewrites
      # pages on every update, which git cannot deltify). It is cached between
      # runs instead, so each run only embeds the chunks the digest just added,
      # then published to Pages as a static file.
      - name: Restore corpus cache
        uses: actions/cache/restore@v4
        with:
          path: data/corpus.db
          # Exact key never hits; the prefix restores the newest previous corpus.
          key: corpus-db-${{ github.run_id }}
          restore-keys: corpus-db-

      # Chunking is deterministic and cheap, and `build` carries existing vectors
      # over by (video_id, start_s, text), so re-running never re-embeds.
      - name: Build corpus
        run: uv run scripts/corpus.py build

      # Non-fatal: a rate-limited or flaky embeddings endpoint must not block the
      # site deploy. Vectors are committed per batch, so a partial run resumes
      # next time and the corpus stays queryable via BM25 meanwhile.
      - name: Embed new chunks
        continue-on-error: true
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          EMBED_MODEL: ${{ vars.EMBED_MODEL }}
        run: uv run scripts/corpus.py embed

      # Keyed on transcript content: when the digest found nothing new the key
      # already exists and the save is skipped, so a 15 MB entry is not written
      # every two hours.
      - name: Save corpus cache
        uses: actions/cache/save@v4
        with:
          path: data/corpus.db
          key: corpus-db-${{ hashFiles('data/transcripts/**') }}

      # Anything in docs/public/ is copied into the build output, so this ships
      # with the site without ever being committed to the repo.
      - name: Publish corpus to the site
        run: |
          mkdir -p docs/public
          cp data/corpus.db docs/public/corpus.db
          uv run scripts/corpus.py stats

      - name: Build site
        env:
          SITE_BASE: ${{ vars.SITE_BASE }}   # e.g. "/youtube-ai-trtanscriptions/" for project pages
        run: npm run docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
