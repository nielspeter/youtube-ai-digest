name: YouTube Digest

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6h at :17 (00:17, 06:17, 12:17, 18:17 UTC); odd minute avoids top-of-hour congestion
  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed mode: mark current feed items as seen without summarizing'
        type: boolean
        default: false

permissions:
  contents: write        # commit state + summaries back to the repo
  pages: write           # deploy to GitHub Pages
  id-token: write        # required by deploy-pages

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (manages the Python env on demand)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Run digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN }}
        run: |
          if [ "${{ inputs.seed }}" = "true" ]; then
            uv run scripts/digest.py --seed
          else
            uv run scripts/digest.py
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/summaries/ docs/index.md
          # Keep a heartbeat so the schedule isn't auto-disabled after 60 idle days.
          date -u +%FT%TZ > data/last-run
          git add data/last-run
          git diff --cached --quiet || git commit -m "chore: digest $(date -u +%F)"
          git push

      - name: Build site
        env:
          SITE_BASE: ${{ vars.SITE_BASE }}   # e.g. "/youtube-ai-trtanscriptions/" for project pages
        run: npm run docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
