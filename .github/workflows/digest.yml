name: YouTube Digest

on:
  schedule:
    - cron: '7,37 * * * *'   # every 30 min (:07 and :37) — small batches per run stay under YouTube's bot-check threshold; blocked videos retry next run on a fresh runner IP
  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed mode: mark current feed items as seen without summarizing'
        type: boolean
        default: false

permissions:
  contents: write        # commit state + summaries back to the repo
  pages: write           # deploy to GitHub Pages
  id-token: write        # required by deploy-pages

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (manages the Python env on demand)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install site dependencies
        run: npm ci

      # Optional: authenticate yt-dlp so YouTube's "confirm you're not a bot"
      # block on cloud IPs is bypassed. Add a repo secret YTDLP_COOKIES containing
      # a Netscape-format cookies.txt exported from a logged-in browser.
      - name: Write YouTube cookies (if provided)
        env:
          YTDLP_COOKIES_CONTENT: ${{ secrets.YTDLP_COOKIES }}
        run: |
          if [ -n "$YTDLP_COOKIES_CONTENT" ]; then
            printf '%s' "$YTDLP_COOKIES_CONTENT" > "$RUNNER_TEMP/cookies.txt"
            echo "YTDLP_COOKIES=$RUNNER_TEMP/cookies.txt" >> "$GITHUB_ENV"
            echo "cookies configured"
          else
            echo "no cookies secret set — proceeding without (bot-check may block some videos)"
          fi

      - name: Run digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN }}
          # Optional residential proxy for YouTube only (bypasses the bot-check).
          # e.g. http://user:pass@gate.decodo.com:7000 — LLM traffic stays direct.
          YT_PROXY: ${{ secrets.YT_PROXY }}
        run: |
          if [ "${{ inputs.seed }}" = "true" ]; then
            uv run scripts/digest.py --seed
          else
            uv run scripts/digest.py
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/summaries/ docs/index.md
          # Keep a heartbeat so the schedule isn't auto-disabled after 60 idle days.
          date -u +%FT%TZ > data/last-run
          git add data/last-run
          git diff --cached --quiet || git commit -m "chore: digest $(date -u +%F)"
          git push

      - name: Build site
        env:
          SITE_BASE: ${{ vars.SITE_BASE }}   # e.g. "/youtube-ai-trtanscriptions/" for project pages
        run: npm run docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
